body:
  text: 李際寧年范成和尚在山西趙城縣廣勝上寺發現了金藏次年月支那內學院派遣蔣唯心抵晉南調查同年月蔣唯心將調查情況撰成長文金藏雕印始末考首次發表在南京國風第五卷十二號上年月金藏雕印始末考由南京支那內學院單印發行蔣唯心的文章對金藏概況作了系統研究這是當代人研究金藏最具參考價值的成果之一儘管如此幾十年來對於金藏的研究仍有不少問題難以得到圓滿解答其主要原因就是記載崔法珍刊雕金藏史事的原始材料即金章宗明昌四年年由祕書丞兼翰林修撰趙渢書寫翰林侍講學士黨懷英篆額的記載崔法珍刊雕金藏情況的碑文以下稱為趙渢碑已經亡佚不久前筆者在北京圖書館善本部發現了有關崔法珍刊雕金藏的新資料筆者認為這條資料與佚失以久的趙渢碑有密切關係是研究趙渢碑和崔法珍刊雕金藏的重要資料本文即圍繞這條材料對趙渢碑及有關問題考辨如下一這條材料發現在北京圖書館藏明補版的磧砂藏中年紅衛兵打碎了柏林寺大殿佛像在佛像中發現了佛教藏經以及零本佛經和少量單本古籍消息傳出以後北京圖書館善本部丁瑜王玉良等先生迅即前往考察據丁瑜先生的介紹這些書籍當時就散亂地堆在柏林寺院中人才進院隨風便吹來一張殘片看上去頗類磧砂藏的扉畫隨後經過簡單翻檢懷疑這一大批藏經印本就是磧砂藏便搶救收檢起來此後這批經本一直存放在善本庫中年方廣錩先生指導善本部工作人員將這批佛經按磧砂藏目録進行了順號整理清理出兩千數百餘冊分裝在十個木箱中年間筆者對這部大藏經進行了初步整理和研究得到以下一些認識這批兩千數百冊的佛經經過與影印宋磧砂藏經本比勘可以肯定它確屬於磧砂藏儘管已經殘損缺半仍然有其特別重要的資料價值如據此可以補充不少開元寺臥龍寺本缺失的部分同時通過比較還發現了不少影印宋磧砂藏經本修版至誤的地方其中大般若等經為元妙嚴寺版我們都知道磧砂藏始刊於南宋時期但在開元寺臥龍寺本中已經見不到宋版大般若經而是以元代妙嚴寺本補配入藏據筆者瞭解磧砂宋版大般若經僅見於日本奈良西大寺和中國北京圖書館北圖本略有殘損此部新發現的磧砂藏之大般若經等經同樣以妙嚴寺本配補這部大藏是明宣德年間年由北京居民楊安請印的其根據是經本卷尾的戳記大明國北京順天府大興縣居賢坊居住奉佛信士董福成謹發誠心在於江杭州府後朝門許大藏尊經一藏不為自求喜捨資財上報四恩下資三有法界有情同圓種智者奉三寶信士董福成一家眷等謹發誠心眷屬王氏弟董旺眷屬黎氏男董福興眷屬聶氏侄男董黑搨外生女妙玉孫男董福侄女善兒宣德七年年八月吉日助緣人楊安在這部殘存的磧砂藏中董福成的請印戳記比比皆是這部大藏在明永樂年間年由杭州西湖南山高麗慧因寺僧人鮑善恢發起補刊完整其補刊磧砂藏的活動見於大般若經卷第五百二十八卷尾的題記善恢宿生慶幸忝遇佛乘司殿職於萬善戒壇惟慚惟愧募正知於一真實地誠恐誠惶嘗睹本寺藏經函內少缺數多遂往磧砂妙嚴二剎補印藏典全其品章因見彼寺經版年深歲久朽爛缺缺者多發心備版化募衆緣命工刊補完就使大教流通令正法久住永樂九年年辛卯孟春吉日杭州仙林萬善戒壇知殿淨人鮑善恢謹識佛說法乘義決定經卷中題記杭州府西湖南山高麗惠因華嚴講寺沙彌善恢致圓嘗往蘇州府城東磧砂延聖寺印補大藏尊經遇見經版中間多有損壞缺少印去者不能全藏發心化募十方施主命工刊補完成大明永樂十年年歲在壬辰菊月重九日住山比丘真境謹題從補刊題記中可以知道參與該藏補刊助緣的多是杭州府附近四方僧俗如始九大寶集經卷八十九第三版版心題湖州新市施主范氏報薦亡夫倪子實往生淨土在此為節省篇幅有關資料不再一一轉録當由另文介紹此次補刊經版活動的起迄時間當在明初永樂七年年前後至永樂十年永樂十年是我們見到的最晚的補刊題年因而估計補刊經藏活動的下限時間當距永樂十年不遠以上是有關背景情況新發現的崔法珍刊雕金藏的材料就是在這部經過明代永樂年間補刊的磧砂藏的題記中發現的題記共有兩則刊雕在大寶積經卷第二十九千字文編號火九和卷第一百五千字文編號文五的經尾兩卷的行款版式字體風格大部分與影印宋磧砂藏經本相同不同之處在於卷二十九最後一版第十一紙為鮑善恢補刊補刊助緣題記雕在本版第半葉的版心處卷一百五第十五十六兩版為鮑善恢補刊其中補刊助緣題記有多則此不詳録此處為研究方便謹將兩則題記分別録文於下題記一最初敕賜弘教大師雕藏經板院記潞州長子縣崔進之女名法珍自幼好道年十三歲斷臂出家嘗發誓願雕造藏經垂三十年方克有成大定十有八年年始印經一藏進於朝奉敕旨令左右街十大寺僧香花迎經於大聖安寺安置既而宣法珍見於宮中尼寺賜坐設齊法珍奏言臣所印藏經已蒙聖恩安置名剎所造經板亦願上進庶得流布聖教仰報國恩奉詔許之乃命聖安寺為法珍建壇落髮受具為比丘尼仍賜錢千萬洎內閣五百萬起運經板至二十一年年進到京師其所進經板凡一十六萬八千一百一十三計陸千九百八十為卷上命有司選通經沙門導遵等五人校正至二十三年年賜法珍紫衣號弘教大師其導遵等亦賜紫衣德號其同心協力雕經板楊惠溫等七十二人並給戒牒許禮弘教大師為師仍置經板於大昊天寺遂流通焉韙哉眷遇之隆古未有也自昔釋迦如來為一大事因緣出現於世靈山演法各隨衆生根器利鈍方便分別大小乘教為世津梁後人因之識心達本悟無為法者不可以數計矣然教法之興雖繫於人亦由其時自漢明帝歷晉魏以來雖有釋氏經典所傳由未廣也其後玄奘義淨二大士跋涉轇海至天竺國不憚艱苦磨以歲月得經教焉自是震旦佛法備矣是以城邑山林精藍塔廟或建寶藏或為轉輪安置經典為世福田若緇若素書寫受持頂戴奉行者無處無之蓋如來本願欲使衆生見聞而獲福也然今弘教大師備修苦行以刊鏤藏板為本願於是協力助緣劉法善等五十餘人亦皆斷臂燃臂燃指刳眼割肝至有捨家産鬻男女者助修經板勝事始終三十年之久方得成就嗚呼可謂難也哉己門人慧仁等具言刊經本末謁文於東平趙渢述記時歲次己丑仙林講寺祗殿鮑善恢為是本寺藏典缺少嘗往磧砂妙嚴二剎印補見彼經板多有朽爛缺缺發心備板化募衆緣命工刊補幸獲完備今善恢自思刊補小緣經久歲月率難成就想當時弘教大師自幼出家斷臂設誓刊刻藏板始終三十年方得成就實為世間第一希有功德而復遇金世宗皇帝敕賜錢及號記焉善哉得非有是道復有是人有是人復遇是時此其所以成難成之功庶不負如來付囑之意嗚呼前哲之功於斯盛矣懼夫久而泯其所由無傳於世因而刊之使後賢觀其所由遂不昧弘教大師之功也耶時永樂九年歲次辛卯孟冬望日杭州仙林萬善戒壇祗殿善恢謹題題記二最初雕造大藏經板昔潞州長子縣崔進之女法珍年一十三歲斷臂出家發大誓願雕藏經板垂三十年方刻有成大定十有八年始印一藏進於朝敕旨迎經於大聖安寺建壇受具為比丘尼仍賜錢千萬洎內閣錢五佰萬起運經板至二十一年至京師其所進經板凡一十六萬八千一佰一十三面為卷六千九百八十敕命有司選通經沙門道遵等五人教正二十三年賜法珍紫衣敕號弘教大師其協力雕造經板楊惠溫七十二人並給戒牒許禮弘教大師為師仍置經板於大昊天寺安奉遂流通焉然其舊經率多繕寫故教完具為難今弘教大師備修苦行以刊鏤藏經為本願於劉法善等五十餘人亦皆斷臂燃臂燃指刳眼割肝至有捨家産鬻男女者助修經板勝事始終三十年之久方得成就嗚呼可謂難也哉時永樂七年己丑歲杭州仙林講寺祗殿善恢為見本寺藏典數多缺缺嘗往磧砂妙嚴二剎印補因見彼寺經板多有朽爛缺少發心備板化募衆緣命工刊補完備經於歲月率難成就今善恢自思往昔弘教大師自幼以清淨堅固勇猛之心斷臂設誓刊刻藏板數及二十萬始終三十餘年方得成就實為世間第一希有功德此其所以成難成之功也耶因而刊之使後觀其所由不昧初因者也時永樂九年歲次辛卯仲秋吉杭州仙林講寺祗殿善恢謹題從題記一的結構看它非常明顯地分為兩部分文首起潞州長子縣崔進之女名法珍迄嗚呼可謂難也哉一段是第一部分是鮑善恢自述其題記中有關崔法珍刊雕金藏資料之來源於己門人慧仁等具言刊經本末謁文於東平趙渢述記以下是鮑善恢聯想自己補刊磧砂藏之艱難而發感慨就題記二言從其資料來源題記結構遣詞用語諸方面看則題記明顯地帶有略寫的迹象是録文一的簡寫本二鮑善恢題記謂己門人慧人等具言刊經本末謁文於東平趙渢述記說明其門人弟子確曾見到了趙渢碑趙渢山東東平人金史有傳然文字簡略未言及刻碑一事按照現在學術界一般看法趙渢碑佚失在明代中期鮑善恢生活在明代永樂年間他的時代是應該能夠看到此碑的為說明這個問題我們先來看看傳世文獻中有關崔法珍刊雕金藏的資料自明代以下各種文獻凡記述法珍刊雕金藏者皆為互相輾轉引録都非纂輯者親眼得見至今所傳無出其右因此在辨證鮑善恢題記可信度問題之前首先需要對趙渢碑的文獻記載及相互關係略做比較傳世文獻中有關崔法珍刊雕金藏的資料只有不多的幾條日下舊聞考清日下舊聞考卷一百五十五存疑祕書省條祕書省今在燕弘法寺金國文具録考纂者按語云析津志弘法寺在舊城金大定十八年潞州崔進女法珍印經一藏進於朝命聖安寺設壇為法珍受戒為比邱尼二十三年賜紫衣弘教大師明昌四年立碑石祕書丞兼翰林修撰趙渢記翰林侍講學士黨懷英撰額蓋此剎元時尚存廢於明代康熙二十五年年朱彝尊以布衣身份捃拾載籍及金石遺文從一千六百多種古籍中選出有關北京史志的資料編輯成日下舊聞分十三門四十二卷至乾隆三十九年年又由於敏中等任總裁對日下舊聞補遺增添考證編成日下舊聞考一百六十卷日下舊聞考的資料來源見於每條下的注其中引書今天有許多已經亡佚如元一統志圖經志書等其中也包括元末人熊夢祥的析津志因此可以肯定日下舊聞考的編輯者增補考時使用了永樂大典的輯佚資料況且其時自永樂大典中輯佚古書也成為一時風氣日下舊聞考卷十三國朝宮室云校輯永樂大典內之散簡零編並搜訪天下遺籍不下萬餘種匯為四庫全書擇人所罕覯有裨世道人心及足資考鏡者剞劂流傳嘉惠來學因而推測日下舊聞考有關崔法珍刊雕金藏的資料出於永樂大典之析津志金史紀事本末金史紀事本末卷三十世宗致治金國文具録祕書省今在燕宏法寺析津志云宏法寺在舊城大定十八年潞州崔進女法珍印經一藏進於朝命聖安寺設壇為法珍受戒為比邱尼二十三年賜紫衣宏教大師明昌四年立碑石祕書丞兼翰林修撰趙渢記翰林侍講學士黨懷英撰額蓋此剎元時尚存至明始廢姑録於此以存金石之遺金史紀事本末清末李有棠著本書情況上海古籍出版社的出版說明做了介紹李有棠字芾生江西萍鄉人舉人出身光緒年間年任江西峽江縣儒學訓導時周覽歷代記事本末深為遼金二代中缺遺憾即而撰之李有棠著有遼史紀事本末與金史紀事本末因其考定頗詳詔給內閣中書銜李有棠書引法珍刊雕金藏資料之出處蔣唯心金藏雕印始末考一文頗含糊其辭宿白先生認為李書出析津志宿先生在趙城金藏和弘法藏注文中說蔣文第三章引金史紀事本末一段云李有棠引舊記以舊記代替析津志周叔迦大藏經雕印源流紀略引李書亦略去析津志而不書蔣周兩先生為何忽視李有棠之根據殊為不解李有棠生活在清末其時所見資料來源或亦出於輯佚永樂大典之析津志析津志析津志輯佚寺觀弘法寺在舊城金大定十八年潞州崔進之女法珍印經一藏進於朝命聖安寺設壇為法珍受戒為比丘尼二十三年賜紫衣弘教大師明昌四年立碑石祕書丞兼翰林修撰趙渢記翰林侍講學士黨懷英撰額析津志元末人熊夢祥編纂熊夢祥小傳見乾隆豐城縣志卷十人物志熊氏書成於元末明初編修永樂大典時此書還被收在其中而至明中晚期此書已經亡佚依李致忠先生的結論析津志的失傳大概當在萬歷年或萬曆前一點最晚也要在明末以前就已經亡佚了本世紀三十年代趙萬里先生組織輯佚永樂大典佚書其中就有析津志輯稿一種年北京圖書館善本組加工整理北京古籍出版社出版按李致忠先生撰寫的整理說明北京圖書館所輯析津志主要來自四種書第一種是從永樂大典原本中直接採集第二種是從日下舊聞考中轉輯第三種是從徐維則鑄學齊藏本所謂憲台通紀中採集第四種是從通學齊主人孫殿起收購又轉讓給北京圖書館的順天府志殘卷及北京大學圖書館所藏繆荃孫從永樂大典所輯順天府志殘卷中轉録其有關崔法珍刊雕金藏的資料或者應該出自永樂大典所引析津志永樂大典順天府永樂大典順天府卷七弘法寺在舊城金大定十八年潞州崔進女法珍印經一藏進於朝命聖安寺設壇為法珍受戒為比丘尼二十一年以經版達京師二十三年賜紫衣弘教大師以弘法寺收貯經版及弘法寺西地與之明昌四年立碑石祕書丞兼翰林修撰趙渢記翰林侍講學士黨懷英撰額繆荃孫藝風堂抄本順天府志藏北京大學圖書館書中有繆荃孫硃筆親校此書的來歷北京大學出版社影印時做了出版說明順天府志為繆荃孫於光緒丙戌年年自永樂大典四千六百五十卷順天府七至十四抄出永樂大典內順天府共二十卷時僅存八卷後均佚逸繆抄題為順天府志今仍之繆荃孫藝風藏書記卷三明初順天府志殘本記載荃孫修府志時搜之大典平字韻已失去忽見此書七卷至十四卷上下均闕亟為録存此書在藝風藏書記卷三題名為明初順天府志殘本後人多誤此書名為順天府志姜緯堂先生在文史第三十二輯上撰文辨繆鈔順天府志的來歷指正其書應名為永樂大典順天府是書即永樂大典平聲十二先韻天字卷四千六百五十至卷四千六百五十七的全文繆荃孫抄此書的時間在光緒十二年至十四年年正月之間其時翰林院八千多冊永樂大典還在繆抄即來源於此繆抄順天府志的結構姜緯堂先生有總結各條資料皆首冠所出之書名文長者且於文末附注已上書名已上並見書名這種結構正與永樂大典原本相合繆抄本的弘法寺條下是昭覺禪寺在昭覺禪寺條下正有已上並見元一統志字樣照此看來法珍刊雕金藏的資料出自永樂大典順天府的元一統志分析上述四則傳世文獻的流傳情況可知有關崔法珍刊雕金藏的資料其來源無出永樂大典者而永樂大典資料的來源不論是析津志還是元一統志它們肯定只能出於同一個底本這個底本就是金明昌四年由趙渢書寫黨懷英篆額之趙渢碑鮑善恢生活的時代正是永樂大典撰成不久此時趙渢碑還在析津志等記載金元歷史的資料還在鮑善恢等人是有條件見到趙渢碑原碑文的回過頭來再看鮑善恢的題記從文獻內外的資料也可以證明鮑善恢題記一的第一部分是趙渢碑原文首先從鮑善恢題記內部分析鮑善恢的題記一繁一簡簡者是縮寫而文繁者是趙渢碑原文的記録這一點在題記中有明顯的區別如題記一敘述前朝史事曰潞州長子縣而在題記二卻改用昔潞州這樣的文字後者顯而易見帶有回憶前朝事的口氣考潞州之歷史沿革其名來源於春秋時期潞子國戰國時曰上黨北周置潞州郡隋恢復上黨郡名唐時名稱一度反覆後仍稱潞州宋曰隆德府金復稱潞州屬金十九路之河東北路元初稱隆德府尋復稱潞州屬河東山系道明升潞安府屬山西承宣布政司清從之曰潞安府鮑善恢是明初人其題記二中曰昔潞州說明此時潞州已改名潞安府談彼地之往事正宜以昔相稱而在題記一之中不用昔潞州卻直云潞州正反映此文字是金朝人趙渢當時的自敘有這樣區別的地方不止一處如録文一中敘述金朝皇帝命導遵等僧人參與校正經文一句云上命有司而在録文二里這一句被鮑善恢改述為敕命有司上命者是本朝人對當今皇上的尊稱鮑善恢本人無論如何不能稱金朝皇帝為上而録文二是鮑善恢的縮略改寫敕命有司一句正是他對前朝事件的準確敘述兩則題記口氣如此不同合理的解釋是因為敘述者身份不同蓋前者是金朝人趙渢後者則是明朝人鮑善恢其次用題記一與傳世文獻相比較不僅主要情節相同甚至文字和語言亦驚人的相似儘管北大繆抄本較其他記載多出了二十一年以經版達京師以弘法寺收貯經版及弘法寺西地與之兩句但是如果仔細分析這些文獻的特點可以清楚地看到它們有許多共同的地方如法珍的籍貫及父名經藏進京的時間設壇受戒地點賜紫衣的時間御賜法號等等這些特點是我們瞭解崔法珍刊雕金藏的最基本情況鮑氏的題記不僅記録了這些情節且較之更詳盡如非照録趙渢原碑之文字就很難解釋為什麼與傳世文獻資料如此一致當然我們見到的傳世資料其內容遠比鮑善恢題記簡略此蓋由於史志書籍體例約束需要經過編纂加工刪繁就簡因此保留下來的只能是事情的大略而鮑善恢撰寫題記的目的就如他自己所說勿使前哲之功懼夫久而泯其所由無傳於世故刊版傳之使後賢觀其所由遂不昧弘教大師之功為此他當然會詳細記載有關內容甚至照録原碑文字我們認為鮑善恢題記照録了趙渢碑還得到題記以外資料的證明首先題記敘述的金藏刊雕的起止年代與趙城金藏完全相同題記云法珍雕造經藏垂三十年方克有成這一句話在各本傳世文獻中是沒有的傳世文獻中唯有陸光祖萬曆十二年年募刻大藏經序提到一句昔有女子崔法珍斷臂募刻藏經三十年始就緒當時檀越有破産鬻兒應之者然而陸光祖生活年代遠晚於鮑善恢有關三十年之說不可能由鮑善恢抄自陸氏如果說二者有抄録引用的關係也只能是陸氏抄引前人鮑善恢的判斷一部佛教大藏經刊雕的起迄年限重要的依據之一是經卷內的題跋北京圖書館藏趙城金藏的雕印年代按照蔣唯心的調查在原刻版中今存三十餘處記載刻版年代其中最早的題年款刊在日字帙大般若經卷八十二跋皇統九年己巳歲年最遲為雁字帙大乘智印經跋大定十三年年藏經會下重雕造蔣唯心據調查結果對趙城金藏的起訖年代謹慎地做了判斷於般若卷八十二以前尚有八帙智印經後有經七十餘帙刻版起訖雖未必適在皇統九年與大定十三年然據此推測亦不過遠經過調查趙城金藏現存的明確題年是金熙宗天眷二年年見鳴字帙妙法蓮花經卷三卷五卷六卷七四卷現均藏上海圖書館這樣算起來自天眷二年至大定十三年與三十年之數約合其次鮑善恢題記中所記卷數與趙城金藏實際卷數約略相同趙城金藏的實際卷數由於缺乏明確的記載加之發現時即有缺失已經不是一部完整的大藏故不能確知按照趙城金藏從天至幾的千字文編次應有帙約餘卷童瑋先生說趙城金藏全書採用千字文次第編目自天至幾字止計帙每帙基本含十卷或略有增減約七千卷左近這個數字與鮑善恢題記中的計陸千九百八十為卷的數字相符自宋元以來諸本大藏皆無此一卷數南方幾部大藏的卷數都在六千餘卷與七千卷左近相去甚遠另外題記中提到所進經板凡一十六萬八千一百一十三鮑善恢如果沒有所本也不會憑空想這麼個卷數和板片數筆者認為他的題記第一部分就是趙渢碑的原文其時在鮑善恢題記中間有許多我們過去不曾掌握的資料這些資料亦不見於任何傳世文獻的記載如果鮑善恢及弟子其時沒有見過趙渢碑很難相信明代人能夠提出這些想像如道遵楊惠溫劉法善等校經助緣刊經等人名特別是題記提到捨家産鬻男女等情景這些並不見於傳世文獻但在今天尚存的趙城金藏中間明確地保留了百姓捨家産鬻男女的助緣活動的題記這些應證是最好的說明最後略談一下金藏版片存儲地點和趙渢碑的碑名問題自蔣唯心提出金藏與弘法藏關係的問題又經宿白先生著文學界基本延用這種觀點即弘法藏就是金藏的元代補刊本弘法藏的問題比較復雜本文不擬討論在此只就與本文有關的題記資料略做考辨題記云仍置經版於大昊天寺遂流通焉金藏是金代唯一一部雕板大藏板片的保護必然是一件重要的事原版存板於何寺要看彼寺是否具有顯赫莊嚴的地位大昊天寺遼金名剎在金中都宮城正北棠陰坊遼道宗清寧五年年秦越大長公主捨棠陰訪為寺土百頃遼道宗施五萬緡助建并御書大昊天寺扁額及碑文大殿後有寶塔高二百尺金代時期寺及塔種種莊嚴不可殫記壯麗景象元一統志備載值得主意的是日下舊聞考卷五十九所引歸田類藁云至大二年十一月元武宗海山年昊天寺無因而火實際上也就是在元以後大昊天寺幾乎沒有什麼記載了在有金一代盛極時期的大昊天寺存藏金藏的板片的確是很有可能的其板片的儲藏地點就應該是大昊天寺內的藏經院因此筆者認為趙渢碑的碑名應該就是鮑善恢題記起首之標題最初敕賜弘教大師雕藏經板院記三崔法珍斷臂刊雕藏經一事明代以來即出現了不少誤解萬曆十七年年在五台山開雕徑山藏徑山藏又名嘉興藏自嘉靖年發起初在五台山刊雕因其地寒冷移至嘉興繼續其裝幀形式一改以往經折式而為冊葉裝時人稱之方冊本此藏籌劃間許多著名人物為此著文做序形成了一部募刻五台山大藏經會約有關法珍的誤解就出現在此書中此書中收有吳郡王世貞刻大藏緣起序序云於是開士密藏始發心仿弘道尼磧砂故事以儒書例而募梓王世貞認為道開不懼艱辛刊刻徑山藏是學宋時弘道尼刊雕磧砂藏故事在同一書中又有另一種說法馮夢禎撰刻大藏緣起云宋元間除京板外如平江之磧砂吳興之某寺越之某寺某寺等具有藏板不啻七八副逮國朝僅有兩京之板而諸方之板盡廢北板稍精而藏於禁中請印甚難時密藏開師尚書五台陸公與夢禎等商及此事不覺慨然隳淚因記磧砂藏板緣始弘道尼斷臂募化弘道化後其徒復斷臂繼之更三世其願始滿馮夢禎文中提及之陸公即陸光祖陸光祖萬曆十二年年募刻大藏經序云昔有女子崔法珍斷臂募刻藏經三十年始就緒當時檀越有破産鬻兒應之者馮王二人認為弘道尼刊雕磧砂藏馮夢禎更誤認為斷臂刊經陸光祖認為崔法珍斷臂募刻藏積三十年方成但他所說之法珍為明代人可見有關誤傳由來以久這些誤傳以後又影響到海外延享年間日本僧人隨天撰緣山三大藏緣起云至明興南北二藏其如北藏者禁闕緘祕請印甚難南版雖間許印其制重大價值甚高致請自少爰有尼法珍者欲募刻方冊藏本簡便宏通遂為激發四方自斷臂示其決心於此海內感動諸人戮力至有破産鬻子應之者三十年而就其功是方冊藏版隨天認為法珍為明人其斷臂刊雕者為明代方冊本藏經近代以來誤傳依然流傳磧砂藏端平目録題記載有藏主法忠葉恭綽在磧砂延聖院小志中猜測法忠與法珍字音略同豈即為一人而轉述有歧歟抑或共同發願由法忠看而崔法珍先為苦行勸募歟姑附一說以存軼事更有人捕風捉影認為金史紀事本末的法珍為另一人與刻藏之事無涉斷臂募刻磧砂藏的是弘道與明代的法珍無涉王世貞序文說仿弘道磧砂故事即就法珍而言換言之弘道斷臂刻宋藏法珍斷臂刻明藏是兩個人兩個事王馮陸三公所引用資料其文意之中顯然看得出與崔法珍刊雕金藏有密切關係馮夢禎言因記磧砂藏板緣始云云或即其曾經看到過鮑善恢永樂九年補刊之磧砂藏題記而誤記落髮受具為比丘尼號弘教大師為弘道尼陸光祖之言明明白白所指斷臂募刻者為崔法珍磧砂藏南宋寶慶年至紹定年間刊雕於平江府陳湖磧砂延聖院寶祐以後延聖院大火又值南宋垂亡刻事一度中斷元大德間年松江府僧録管主八續刊磧砂藏並以吳興妙嚴寺之藏版補入既而再補充祕密經入藏至元沒明興民間所藏之經本往往殘缺不全鮑善恢所在之萬善戒壇亦藏典缺少遂往磧砂妙嚴二寺補印而此時彼二寺之藏版多有朽爛缺缺不能補齊於是有明代補版一事鮑善恢補刊經版在當時當地想必有較大影響這由其補刊題記助緣題記可知而馮夢禎王世貞等人距明代初年已遠而補版磧砂藏又罕傳於世鮑善恢的補版題記更不為後人所知故僅聞其舊事不知其原委以至談到弘道尼事則衆說紛紜以訛傳訛輾轉相襲本文在組織和撰寫過程中特別得到了方廣錩先生的指導和幫助特此致謝另外筆者在修改本文的過程中曾拜託北京大學歷史系榮新江教授調查收藏於美國普林斯頓哥斯德東方書庫中的磧砂藏是否有此題記承榮教授告之彼庫所藏原北京大悲寺之磧砂藏的大寶積經卷二十九卷一百五兩卷皆為明代補抄未見此題記在此並向榮新江教授致謝年月補記
